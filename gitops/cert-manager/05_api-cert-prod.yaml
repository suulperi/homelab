apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-server-certificate-le-prod
  namespace: openshift-config
spec:
  isCA: false
  commonName: "api.ocp.sohlberg.io"
  secretName: api-server-certificate-le-prod-secret
  dnsNames:
  - "api.ocp.sohlberg.io" 
  issuerRef:
    name: lets-encrypt-production
    kind: ClusterIssuer